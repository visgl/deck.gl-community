name: release

on:
  push:
    tags:
      - v*

jobs:
  check_branch:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.permitted.outputs.result }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Fetch remote branches
        run: |
          git fetch origin --depth=1

      - name: Check if on permitted branch
        id: permitted
        run: |
          result=
          if git branch -a --contains $GITHUB_SHA | grep -q 'remotes/origin/master$'; then
            result=true
          elif git branch -a --contains $GITHUB_SHA | grep -q 'remotes/origin/.*-release$'; then
            result=true
          fi
          echo "result=${result}" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-22.04
    needs: check_branch
    permissions:
      contents: write

    if: ${{ github.repository_owner == 'visgl' && needs.check_branch.outputs.should_build }}

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack / Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn -v

      - name: Cache Yarn 4 artifacts
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .pnp.*
            .yarn/install-state.gz
          key: yarn-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          yarn
          yarn bootstrap

      - name: Build packages
        run: yarn build
      
      - name: Run tests
        run: |
          yarn lint
          yarn test

      - name: Login to NPM
        run: npm config set "//registry.npmjs.org/:_authToken=${NPM_ACCESS_TOKEN}"

      - name: Verify NPM publish access
        run: |
          npm whoami
          npm access list packages @deck.gl-community --json > /tmp/npm-access.json
          node - <<'NODE'
          const fs = require('fs');
          const packages = JSON.parse(fs.readFileSync('/tmp/npm-access.json', 'utf8'));
          const requiredPackages = [
            '@deck.gl-community/basemap-layers',
            '@deck.gl-community/bing-maps',
            '@deck.gl-community/editable-layers',
            '@deck.gl-community/experimental',
            '@deck.gl-community/geo-layers',
            '@deck.gl-community/graph-layers',
            '@deck.gl-community/infovis-layers',
            '@deck.gl-community/layers',
            '@deck.gl-community/leaflet',
            '@deck.gl-community/react',
            '@deck.gl-community/three',
            '@deck.gl-community/timeline-layers',
            '@deck.gl-community/widgets'
          ];
          const missing = requiredPackages.filter((name) => !Object.hasOwn(packages, name));
          if (missing.length) {
            throw new Error(`NPM token cannot see required @deck.gl-community packages: ${missing.join(', ')}`);
          }
          NODE

      - name: Publish to NPM
        run: npx ocular-publish from-git
