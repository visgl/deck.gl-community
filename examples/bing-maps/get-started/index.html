<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>deck.gl w/ Bing Maps example</title>
        <style>
            #map {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            .deck-tooltip {
                white-space: nowrap;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script type="module">
            import {mountBingMapsGetStartedExample} from './app.ts';

            const container = document.getElementById('map');
            if (!(container instanceof HTMLElement)) {
              throw new Error('Unable to find #map container');
            }

            mountBingMapsGetStartedExample(container);
        </script>
    </body>
</html>
